name: Deploy Frontend to Vercel

# Fires only after CI succeeds on main (or manual dispatch).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Detect frontend-relevant changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SHA="${{ github.event.workflow_run.head_sha }}"
          CHANGED=$(git diff --name-only "${SHA}^" "${SHA}" || true)
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(frontend/|\.github/workflows/deploy-frontend\.yml)'; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "No frontend paths changed — skipping Vercel deploy."
          fi

      - uses: actions/setup-node@v4
        if: steps.filter.outputs.should_deploy == 'true'
        with:
          node-version: '20'

      - name: Deploy via Vercel CLI
        if: steps.filter.outputs.should_deploy == 'true'
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::Vercel secrets missing (VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID)."
            exit 1
          fi
          # Pin CLI for reproducible deploys (do not use @latest).
          npm install --global vercel@39.2.2
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
