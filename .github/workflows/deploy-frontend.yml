name: Deploy Frontend to Vercel

# Fires only after CI succeeds on main (or manual dispatch).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Deep enough to cover multi-commit pushes; tip-only diffs silently skip deploys.
          fetch-depth: 100
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Detect frontend-relevant changes
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SHA="${{ github.event.workflow_run.head_sha }}"
          # Diff against the previous successful CI tip on main, not just SHA^1.
          # A multi-commit push only runs CI for the tip; tip-only diffs miss earlier commits.
          PREV=$(gh run list --workflow CI --branch main --status success --limit 10 \
            --json headSha --jq "[.[] | select(.headSha != \"$SHA\")][0].headSha // empty" || true)
          if [ -n "$PREV" ] && git cat-file -e "${PREV}^{commit}" 2>/dev/null; then
            CHANGED=$(git diff --name-only "$PREV" "$SHA" || true)
            echo "Comparing $PREV..$SHA"
          else
            CHANGED=$(git log --name-only --pretty=format: -n 30 "$SHA" | sed '/^$/d' | sort -u || true)
            echo "Previous CI tip unavailable — using last 30 commits as a safe fallback."
          fi
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(frontend/|\.github/workflows/deploy-frontend\.yml)'; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "No frontend paths changed — skipping Vercel deploy."
          fi

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        if: steps.filter.outputs.should_deploy == 'true'
        with:
          node-version: '20'

      - name: Deploy via Vercel CLI
        if: steps.filter.outputs.should_deploy == 'true'
        id: deploy
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::Vercel secrets missing (VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID)."
            exit 1
          fi
          # Pin CLI for reproducible deploys (do not use @latest).
          npm install --global vercel@39.2.2
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Vercel promoted $DEPLOYMENT_URL to production."

      - name: Verify frontend production routes
        if: steps.filter.outputs.should_deploy == 'true'
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
          PRODUCTION_URL: https://outreach-iota-ruddy.vercel.app
        run: |
          for attempt in $(seq 1 20); do
            deployment_code=$(curl --connect-timeout 10 --max-time 20 -sS \
              -o /dev/null -w '%{http_code}' "$DEPLOYMENT_URL/" || true)
            production_code=$(curl --connect-timeout 10 --max-time 20 -sS \
              -o /dev/null -w '%{http_code}' "$PRODUCTION_URL/" || true)
            manifest_code=$(curl --connect-timeout 10 --max-time 20 -sS \
              -o /dev/null -w '%{http_code}' "$PRODUCTION_URL/manifest.json" || true)

            if [ "$deployment_code" = "200" ] &&
               [ "$production_code" = "200" ] &&
               [ "$manifest_code" = "200" ]; then
              echo "Verified deployment, production alias, and PWA manifest."
              exit 0
            fi

            echo "Attempt $attempt/20: deployment=$deployment_code production=$production_code manifest=$manifest_code"
            sleep 10
          done

          echo "::error::Vercel production verification failed."
          exit 1
