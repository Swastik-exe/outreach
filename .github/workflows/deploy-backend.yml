name: Deploy Backend to Render

# Render builds the Dockerfile itself when the deploy hook fires — this
# workflow's only job is to tell Render "new code is on main, go build it."
# No image registry, no Docker build here — keeps CI fast and Render is the
# single source of truth for the running container.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'mvnw'
      - 'Dockerfile'
      - 'render.yaml'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL is not set in GitHub Secrets."
            echo "::warning::If Render is linked to this repo, it may still auto-deploy on push."
            echo "::warning::Otherwise: Render Dashboard → outreach-backend → Manual Deploy."
            exit 0
          fi
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Render deploy hook triggered."
