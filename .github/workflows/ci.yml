name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: outreach
          POSTGRES_PASSWORD: outreach
          POSTGRES_DB: outreach
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U outreach"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: jdbc:postgresql://localhost:5432/outreach
      DATABASE_USERNAME: outreach
      DATABASE_PASSWORD: outreach
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: ci-jwt-secret-must-be-at-least-32-characters-long
      FRONTEND_URL: http://localhost:3000
      INBOUND_WEBHOOK_SECRET: ci-webhook-secret-for-tests

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Full suite — CI has Postgres + Redis. Do not allow-list class names
      # (new tests were silently skipped before).
      - name: Run tests
        run: ./mvnw -B test

      - name: Build backend package
        run: ./mvnw -B clean package -DskipTests

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies (high+)
        # Development-only tooling advisories are tracked by the scheduled
        # security workflow. A high vulnerability in shipped code blocks CI.
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://outreach-u35s.onrender.com/api/v1
