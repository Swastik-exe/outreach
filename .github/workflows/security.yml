name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 4 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  codeql:
    name: CodeQL (${{ matrix.language }})
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin, javascript-typescript]
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - uses: actions/setup-java@v4
        if: matrix.language == 'java-kotlin'
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Java for analysis
        if: matrix.language == 'java-kotlin'
        run: ./mvnw -B clean package -DskipTests

      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}

  production-dependencies:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Reject high-severity production vulnerabilities
        run: npm audit --omit=dev --audit-level=high

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Build current production image with fresh base layers
        run: docker build --pull --tag outreach-security-scan:${{ github.sha }} .
      - name: Scan container for fixable critical vulnerabilities
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: outreach-security-scan:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '0'
      - name: Upload container findings
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
      - name: Enforce critical vulnerability gate
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: outreach-security-scan:${{ github.sha }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'
