name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 4 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high

  codeql:
    name: CodeQL (${{ matrix.language }})
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin, javascript-typescript]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: github/codeql-action/init@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3.37.1
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        if: matrix.language == 'java-kotlin'
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Java for analysis
        if: matrix.language == 'java-kotlin'
        run: ./mvnw -B clean package -DskipTests

      - uses: github/codeql-action/analyze@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3.37.1
        with:
          category: /language:${{ matrix.language }}

  production-dependencies:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Reject high-severity production vulnerabilities
        run: npm audit --omit=dev --audit-level=high

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Build current production image with fresh base layers
        run: docker build --pull --tag outreach-security-scan:${{ github.sha }} .
      - name: Scan container for fixable critical vulnerabilities
        # v0.36.0 pinned by immutable SHA. Older 0.31.0–0.33.1 releases have
        # CVE-2026-26189; mutable tags are avoided after the 2026 tag compromise.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: outreach-security-scan:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '0'
      - name: Upload container findings
        uses: github/codeql-action/upload-sarif@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3.37.1
        with:
          sarif_file: trivy-results.sarif
      - name: Enforce critical vulnerability gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: outreach-security-scan:${{ github.sha }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'
