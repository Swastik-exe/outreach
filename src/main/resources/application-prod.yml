app:
  cookie:
    secure: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://app.outreachos.com}

spring:
  datasource:
    hikari:
      # Supabase transaction-mode pooler: keep pool small (free tier ~15-20 connections)
      maximum-pool-size: ${HIKARI_MAX_POOL:8}
      minimum-idle: 2
      max-lifetime: 1800000
